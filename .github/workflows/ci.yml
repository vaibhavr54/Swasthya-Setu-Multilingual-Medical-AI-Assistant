name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Tesseract
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-hin

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        env:
          SARVAM_API_KEY: test_key_for_ci
          MISTRAL_API_KEY: test_key_for_ci
          SARVAM_BASE_URL: https://api.sarvam.ai
          TESSERACT_CMD: /usr/bin/tesseract
        run: |
          cd backend
          pytest ../tests/ -v --tb=short

      - name: Run eval framework (schema mode)
        env:
          SARVAM_API_KEY: test_key_for_ci
          MISTRAL_API_KEY: test_key_for_ci
          SARVAM_BASE_URL: https://api.sarvam.ai
        run: |
          cd eval
          python eval_runner.py --mode schema

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: tests/

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t swasthya-setu:latest .

      - name: Test Docker health
        run: |
          docker run -d \
            -p 8000:8000 \
            -e SARVAM_API_KEY=test_key \
            -e MISTRAL_API_KEY=test_key \
            --name setu-test \
            swasthya-setu:latest
          sleep 15
          curl -f http://localhost:8000/health || exit 1
          docker stop setu-test